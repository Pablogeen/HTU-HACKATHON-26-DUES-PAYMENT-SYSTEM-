spring.application.name=dues-payment-system


spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USERNAME}
spring.datasource.password=${PROD_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database=mysql
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# Flyway config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=true


# DB connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#JWT SECRETS
app.jwt.secret=${JWT_SECRET}
app.jwt.algorithm=${JWT_ALGORITHM}
app.jwt.issuer=${JWT_ISSUER}

#Redis
spring.data.redis.host=${PROD_REDIS_HOST}
spring.data.redis.port=${PROD_REDIS_PORT}
spring.data.redis.password=${PROD_REDIS_PASSWORD}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.data.redis.ssl.enabled=true




sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}
sendgrid.from.name=${SENDGRID_FROM_NAME}

paystack.secret=${PAYSTACK_SECRET}
paystack.initialize.url=${PAYSTACK_INITIALIZE_URL}
paystack.callback.url=${CALLBACK_URL}
paystack.verify.url=${PAYSTACK_VERIFY_URL}
paystack.webhook.skip.ip.check=false

#OpenApi
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true


# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.endpoint.prometheus.enabled=true

# App info
management.info.app.enabled=true
info.app.name=COMPSSA Dues Payment System
info.app.version=1.0.0
info.app.description=Dues Payment System for Ho Technical University


#Prevention of addition request to the dtos from the frontend. Remember not to trust frontend guys
spring.jackson.deserialization.fail-on-unknown-properties=true