spring.application.name=dues-payment-system


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database=mysql
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# Flyway config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=true


# DB connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#JWT SECRETS
app.jwt.secret=${JWT_SECRET}
app.jwt.algorithm=${JWT_ALGORITHM}
app.jwt.issuer=${JWT_ISSUER}

#Redis
spring.data.redis.host=${REDIS_LOCAL_HOST}
spring.data.redis.port=${REDIS_LOCAL_PORT}
spring.data.redis.password=${REDIS_LOCAL_PASSWORD}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.data.redis.ssl.enabled=false


#Smtp
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
management.health.mail.enabled=false

paystack.secret=${PAYSTACK_SECRET}
paystack.initialize.url=${PAYSTACK_INITIALIZE_URL}
paystack.callback.url=${CALLBACK_URL}
paystack.webhook.skip.ip.check=true

#OpenApi
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true


# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.endpoint.prometheus.enabled=true

# App info
management.info.app.enabled=true
info.app.name=COMPSSA Dues Payment System
info.app.version=1.0.0
info.app.description=Dues Payment System for Ho Technical University


